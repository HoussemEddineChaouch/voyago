<app-navbar />

<div class="max-w-xl mx-auto px-6 py-12">
  <!-- Back -->
  <a
    routerLink="/dashboard"
    class="text-sm text-gray-500 flex items-center gap-1 hover:text-dark mb-8"
  >
    Back to dashboard
  </a>

  <!-- Avatar -->
  <div class="flex items-center gap-4 mb-8">
    <div
      class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-2xl font-bold text-white shrink-0"
    >
      {{ userInitial }}
    </div>
    <div>
      <h1 class="text-2xl font-extrabold text-dark">Edit profile</h1>
      <p class="text-sm text-gray-400">{{ auth.user()?.email }}</p>
    </div>
  </div>

  <div class="card p-8">
    @if (success()) {
      <div
        class="flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 rounded-xl mb-6"
      >
        <svg
          class="w-4 h-4 shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
        Profile updated! Redirecting...
      </div>
    }

    @if (error()) {
      <div
        class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl mb-6"
      >
        {{ error() }}
      </div>
    }

    <!-- Name -->
    <div class="mb-5">
      <label class="block text-sm font-semibold text-dark mb-1">
        Full name <span class="text-red-400">*</span>
      </label>
      <input
        [(ngModel)]="name"
        type="text"
        placeholder="Your full name"
        class="input"
      />
    </div>

    <!-- Email (read-only) -->
    <div class="mb-5">
      <label class="block text-sm font-semibold text-dark mb-1">Email</label>
      <input
        [value]="auth.user()?.email"
        type="email"
        readonly
        class="input bg-gray-50 text-gray-400 cursor-not-allowed"
      />
      <p class="text-xs text-gray-400 mt-1">Email cannot be changed.</p>
    </div>

    <!-- Phone -->
    <div class="mb-5">
      <label class="block text-sm font-semibold text-dark mb-1"
        >Phone number</label
      >
      <input
        [(ngModel)]="phone"
        type="tel"
        placeholder="+1 555 123 4567"
        class="input"
      />
    </div>

    <!-- Country -->
    <div class="mb-8">
      <label class="block text-sm font-semibold text-dark mb-1">Country</label>
      <select [(ngModel)]="country" class="input">
        <option value="">Select country</option>
        <option value="Tunisia">Tunisia</option>
        <option value="United States">United States</option>
        <option value="United Kingdom">United Kingdom</option>
        <option value="France">France</option>
        <option value="Germany">Germany</option>
        <option value="Spain">Spain</option>
        <option value="Italy">Italy</option>
        <option value="Japan">Japan</option>
        <option value="Australia">Australia</option>
        <option value="Canada">Canada</option>
        <option value="Morocco">Morocco</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- Actions -->
    <div class="flex gap-3">
      <button
        (click)="save()"
        [disabled]="saving()"
        class="btn-primary flex-1 py-3"
      >
        {{ saving() ? "Saving..." : "Save changes" }}
      </button>
      <a routerLink="/dashboard" class="btn-outline flex-1 py-3 text-center">
        Cancel
      </a>
    </div>
  </div>
</div>

<app-footer />

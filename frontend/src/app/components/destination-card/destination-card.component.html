<div
  class="relative rounded-2xl overflow-hidden cursor-pointer group h-64"
  [routerLink]="['/voyages']"
  [queryParams]="{ destination: destination._id }"
>
  <img
    [src]="imageUrl"
    [alt]="destination.name"
    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
  />
  <div
    class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"
  ></div>
  <div class="absolute bottom-4 left-4 text-white">
    <p class="text-xs flex items-center gap-1 text-white/80 mb-1">
      <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
        <path
          d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
        />
      </svg>
      {{ destination.tripCount }} trip{{
        destination.tripCount !== 1 ? "s" : ""
      }}
    </p>
    <h3 class="font-bold text-xl">{{ destination.name }}</h3>
  </div>
</div>

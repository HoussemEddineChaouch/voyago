<nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <!-- Logo -->
    <a
      routerLink="/"
      class="flex items-center gap-2 font-bold text-lg text-dark"
    >
      <img src="../../../assets/logo.png" class="w-8 h-8 object-contain" />
      Voyago
    </a>

    <!-- Nav Links -->
    <div
      class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-500"
    >
      <a
        routerLink="/"
        routerLinkActive="text-primary"
        [routerLinkActiveOptions]="{ exact: true }"
        >Home</a
      >
      <a routerLink="/voyages" routerLinkActive="text-primary">Voyages</a>
      <a routerLink="/destinations" routerLinkActive="text-primary"
        >Destinations</a
      >
    </div>

    <!-- Auth / Avatar -->
    <div class="flex items-center gap-3">
      @if (auth.isLoggedIn()) {
        @if (auth.isAdmin()) {
          <a
            routerLink="/admin"
            class="text-xs font-semibold text-primary border border-primary/30 px-3 py-1 rounded-full hover:bg-primary/5 transition"
          >
            Admin
          </a>
        }
        <a
          routerLink="/dashboard"
          class="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white text-sm font-bold cursor-pointer"
        >
          {{ userInitial }}
        </a>
        <button
          (click)="auth.logout()"
          class="text-sm font-medium text-gray-500 hover:text-red-500 transition flex items-center gap-1"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          Logout
        </button>
      } @else {
        <a
          routerLink="/auth"
          class="text-sm font-medium text-gray-600 hover:text-dark flex items-center gap-1"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
          Login
        </a>
      }
    </div>
  </div>
</nav>

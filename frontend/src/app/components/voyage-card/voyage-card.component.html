<div
  class="card overflow-hidden hover:shadow-md transition-shadow group cursor-pointer"
>
  <!-- Image -->
  <div class="relative h-48 overflow-hidden">
    <img
      [src]="imageUrl"
      [alt]="voyage.title"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
    />
    <!-- Rating badge -->
    <div
      class="absolute top-3 left-3 bg-white/95 backdrop-blur px-2 py-1 rounded-lg text-xs font-semibold flex items-center gap-1"
    >
      <span class="text-yellow-400">★</span>
      {{ voyage.rating }} ({{ voyage.reviewCount }})
    </div>
    <!-- Spots left badge -->
    @if (voyage.spotsLeft <= 5) {
      <div
        class="absolute top-3 right-3 bg-green-500 text-white text-xs font-semibold px-2 py-1 rounded-lg"
      >
        {{ voyage.spotsLeft }} spots left
      </div>
    }
  </div>

  <!-- Body -->
  <div class="p-4">
    <p class="text-xs text-gray-400 flex items-center gap-1 mb-1">
      <svg
        class="w-3 h-3"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
        />
      </svg>
      {{ voyage.destination?.name }}, {{ voyage.destination?.slug | titlecase }}
    </p>
    <h3 class="font-semibold text-dark text-base mb-1">{{ voyage.title }}</h3>
    <p class="text-xs text-gray-400 flex items-center gap-1 mb-3">
      <svg
        class="w-3 h-3"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <circle cx="12" cy="12" r="10" />
        <path d="M12 6v6l4 2" />
      </svg>
      {{ voyage.duration }} days
    </p>
    <div class="flex items-center justify-between">
      <span class="font-bold text-dark"
        >${{ voyage.price | number
        }}<span class="text-xs font-normal text-gray-400">/person</span></span
      >
      <a
        [routerLink]="['/voyages', voyage.slug]"
        class="text-primary text-sm font-medium hover:underline"
        >View details</a
      >
    </div>
  </div>
</div>
